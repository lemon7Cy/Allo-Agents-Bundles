version: allo.workspace.v1
agent: course-report-teaching-agent

metadata:
  title: 教学助手
  subtitle: 课程报告全流程：探索选题、撰写修订、评价反思
  description: 面向课程报告场景的教学工作台，围绕三库材料、六维评价和初终稿增量分析，支持教师和学生完成课程报告全过程。
  icon: graduation-cap
  theme:
    accent: sky
    density: comfortable

layout:
  type: split
  left:
    width: 42
    panels:
      - workflow-overview
      - material-slots
      - six-dimension-rubric
      - progress-checklist
      - evaluation-boundary
  right:
    width: 58
    panels:
      - chat
      - prompts
      - capability-flow
      - artifacts

panels:
  - id: workflow-overview
    type: overview
    title: 教学助手工作流
    summary: 以课程报告为主线，支持“探索与选题 → 撰写与修订 → 评价与反思”的完整教学过程。
    items:
      - 探索与选题：结合课程目标、学生兴趣、素材数据和文献线索形成个性化选题。
      - 撰写与修订：围绕“观点-证据-反思”结构组织报告提纲、段落和修改建议。
      - 评价与反思：基于六维评分模型和初终稿对比，识别真实改进和剩余风险。
      - 教师在环：教学助手提供评价参考，不替代教师正式评分和最终判断。

  - id: material-slots
    type: file_slots
    title: 三库与草稿材料
    description: 当前版本通过材料槽提示用户在对话中上传、粘贴或说明材料；后续可接入真实 workspace 文件绑定。
    slots:
      - id: assignment-brief
        label: 课程任务书 / 作业要求
        description: 报告主题范围、课程目标、格式要求、提交规范和截止时间。
        accepts: [pdf, docx, md, txt]
        required: false
      - id: material-library
        label: 素材库
        description: 课程数据集、实验记录、案例材料、代码、图表和学生作业过程材料。
        accepts: [csv, xlsx, pdf, docx, md, txt, py, ipynb]
        multiple: true
      - id: corpus-library
        label: 语料库
        description: 教材、课程 PPT、教学大纲、学术文献、优秀报告样例和写作模板。
        accepts: [pdf, pptx, docx, md, txt]
        multiple: true
      - id: rubric-library
        label: 指标库 / 六维评分标准
        description: 评价量规、评分维度、格式规范、教师自定义标准和课程要求。
        accepts: [pdf, docx, md, txt]
      - id: initial-draft
        label: 初稿
        description: 用于诊断问题和做增量评价的第一版课程报告。
        accepts: [docx, md, txt, pdf]
      - id: final-draft
        label: 终稿
        description: 用于和初稿对比、生成成长证据链和反思建议的修改后版本。
        accepts: [docx, md, txt, pdf]

  - id: six-dimension-rubric
    type: table
    title: 六维评价模型
    description: 评价时必须结合材料证据，不足之处应标记为证据不足或待教师确认。
    columns:
      - id: dimension
        label: 维度
      - id: focus
        label: 评价关注点
      - id: evidence
        label: 证据来源
      - id: risk
        label: 常见风险
    rows:
      - dimension: 创新性
        focus: 选题是否有新意，是否避免同质化，是否形成个人理解。
        evidence: 选题说明、文献、数据探索记录。
        risk: 题目泛化、与课程目标弱相关。
      - dimension: 数据分析深度
        focus: 是否有合理分析方法、图表解释和结论支撑。
        evidence: 数据集、代码、图表、实验结果。
        risk: 只贴图不解释，结论无法复现。
      - dimension: 完整性
        focus: 报告结构是否完整，关键环节是否缺失。
        evidence: 任务书、提纲、报告文本。
        risk: 缺章节、缺方法、缺反思。
      - dimension: 文献引用
        focus: 是否正确引用、理解和使用文献。
        evidence: 文献材料、引用列表、综述段落。
        risk: 虚构引用、堆砌引用、引用不支撑观点。
      - dimension: 结论合理性
        focus: 结论是否由证据推出，是否回应问题。
        evidence: 观点-证据映射、数据分析结果。
        risk: 过度推断、结论与证据脱节。
      - dimension: 格式规范性
        focus: 是否符合课程模板、图表、引用、标题层级和表达规范。
        evidence: 报告模板、评价量规、终稿。
        risk: 格式混乱、图表或引用不规范。

  - id: progress-checklist
    type: checklist
    title: 课程报告进度
    items:
      - 明确课程任务书、报告目的、读者和提交要求。
      - 整理素材库、语料库和指标库，标记仍缺少的材料。
      - 完成选题探索，并确认创新性、可行性和课程匹配度。
      - 形成报告提纲和“观点-证据-反思”映射。
      - 完成初稿，并按六维模型进行自查或评审。
      - 根据反馈完成修订，保留关键修改依据。
      - 提交终稿，并进行初终稿增量评价。
      - 生成教师参考评语、学生反思问题和下一步改进建议。

  - id: evaluation-boundary
    type: markdown_panel
    title: 评价边界
    markdown: |
      - 教学助手是认知伙伴，不是代写工具。
      - 评价结论必须基于课程材料、学生文本、数据、文献或评价量规。
      - 缺少证据时，应标记为“证据不足”或“待教师确认”。
      - 教学助手只提供评价参考，不替代教师正式评分。
      - 不鼓励学生隐藏 AI 参与，也不把 AI 润色等同于真实理解提升。

  - id: chat
    type: agent_chat
    title: 教学助手对话
    source:
      agent: self

  - id: prompts
    type: entry_prompts
    title: 常用任务
    description: 常用任务来自 capabilities.yaml，覆盖选题、三库整理、提纲生成、六维评价和增量分析。
    source:
      prompts: capabilities.entry_prompts

  - id: capability-flow
    type: capability_board
    title: 能力流程
    description: 展示教学助手声明的全流程能力和当前依赖状态。
    source:
      capabilities: self

  - id: artifacts
    type: artifact_list
    title: 教学产物记录
    description: 当前为产物占位区，后续可接入提纲、评审表、增量评价、教师评语和学生反思记录。
    filters:
      kinds: [topic_plan, outline, draft_review, rubric_evaluation, draft_comparison, reflection]
