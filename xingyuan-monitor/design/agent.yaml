status:
  runtime_loaded: false
  design_loaded: true
  phase: phase-1-workbench
  purpose: Design-level Agent Bundle descriptor. Runtime still loads config.yaml, SOUL.md, and capabilities.yaml.

agent:
  id: xingyuan-monitor
  display_name: 星元枢算助手
  product_shape: allo_business_workbench
  primary_entry: desktop_workbench
  secondary_entries:
    - feishu_bot_mention
    - scheduled_inspection
  runtime_loaded_files:
    - config.yaml
    - SOUL.md
    - capabilities.yaml

workbench:
  route_owner: Allo desktop capability workspace
  primary_objects:
    - inspection_run
    - snapshot
    - evidence
    - feishu_draft
    - runtime_status
  chat_role: follow_up_and_explanation_only

boundaries:
  orchestration_owner: agent_bundle
  self_skill_required: false
  maas_data_owner: maas-fleet-monitor skill
  feishu_delivery_owner: feishu-webhook-report skill
  allo_repository_role: workbench_shell_bundle_readiness_and_result_presentation
  no_hardcoded_maas_business_logic: true

capability_model:
  agent_bundle:
    owns:
      - identity
      - system_prompt
      - skill_and_mcp_composition
      - output_profiles
      - permission_boundaries
      - entrypoint_behavior
  skills_and_mcp:
    owns:
      - maas-fleet-monitor data retrieval
      - dfcode-enterprise-mcp business data tools
      - feishu-webhook-report card rendering and delivery
  orchestration_note: 星元枢算助手自身是 Agent Bundle 编排层，不作为 Skill 声明；后续能力编排只围绕该智能体组合外部 Skill 与 MCP。
