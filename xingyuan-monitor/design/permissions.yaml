status:
  runtime_loaded: false
  design_loaded: true
  phase: phase-1-workbench
  purpose: Permission and safety boundary design. Runtime enforcement remains in Skill, MCP, gateway, and channel layers.

defaults:
  read_only: true
  no_secret_exposure: true
  no_metric_fabrication: true
  no_production_mutation: true

allowed_actions:
  - inspect_capability_readiness
  - read_maas_metrics_via_skill
  - read_dfcode_status_via_mcp
  - create_feishu_draft
  - send_feishu_when_explicitly_requested

blocked_actions:
  - expose_tokens_passwords_api_keys_or_cookies
  - write_database_records
  - restart_services
  - change_provider_pool_routing
  - mutate_accounts_or_permissions
